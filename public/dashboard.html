<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Employee Management</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="navbar">
        <span class="brand">Employee Management</span>
        <nav>
            <a href="/dashboard.html">Dashboard</a>
            <a href="/employees.html">Employees</a>
            <button id="logout-btn" class="btn-logout">Logout</button>
        </nav>
    </header>

    <div class="container">
        <section class="welcome-panel">
            <p class="welcome-kicker">Landing Page</p>
            <h1 id="welcome-title">Hello there.</h1>
            <p id="welcome-subtitle" class="welcome-copy">Welcome to your employee dashboard.</p>
        </section>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Employees</h3>
                <div class="value" id="total-employees">0</div>
            </div>
            <div class="stat-card">
                <h3>Average Salary</h3>
                <div class="value" id="avg-salary">$0</div>
            </div>
        </div>

        <div class="stats-grid breakdown-section">
            <div class="stat-card" style="text-align:left;">
                <h3>By Department</h3>
                <ul class="breakdown-list" id="dept-breakdown">
                    <li><span>Loading…</span></li>
                </ul>
            </div>
            <div class="stat-card" style="text-align:left;">
                <h3>By Role</h3>
                <ul class="breakdown-list" id="role-breakdown">
                    <li><span>Loading…</span></li>
                </ul>
            </div>
        </div>

        <!-- ===== Pomodoro Focus Session ===== -->
        <section class="pomodoro-section">
            <h2 class="section-title">Focus Session</h2>
            <div class="pomodoro-card">

                <!-- Circular timer -->
                <div class="timer-display">
                    <svg class="timer-ring" viewBox="0 0 120 120" aria-hidden="true">
                        <circle class="timer-ring-bg" cx="60" cy="60" r="54"/>
                        <circle class="timer-ring-progress" cx="60" cy="60" r="54"/>
                    </svg>
                    <span class="timer-time" id="timer-time" aria-live="polite" aria-label="Time remaining">25:00</span>
                </div>

                <!-- Duration selector -->
                <div class="duration-selector" role="group" aria-label="Session duration">
                    <button class="duration-btn" data-minutes="15">15 min</button>
                    <button class="duration-btn active" data-minutes="25">25 min</button>
                    <button class="duration-btn" data-minutes="35">35 min</button>
                    <button class="duration-btn" data-minutes="45">45 min</button>
                </div>

                <!-- Timer controls -->
                <div class="timer-controls">
                    <button class="btn btn-primary" id="timer-start">Start</button>
                    <button class="btn btn-secondary" id="timer-reset">Reset</button>
                </div>

                <!-- Settings -->
                <div class="pomodoro-settings">
                    <div class="settings-row">
                        <span class="settings-label">Theme</span>
                        <div class="theme-btns" role="group" aria-label="Theme selection">
                            <button class="theme-btn active" data-theme="light">Light</button>
                            <button class="theme-btn" data-theme="dark">Dark</button>
                            <button class="theme-btn" data-theme="focus">Focus</button>
                        </div>
                    </div>
                    <div class="settings-row">
                        <span class="settings-label">Sounds</span>
                        <div class="sound-toggles">
                            <label class="sound-toggle">
                                <input type="checkbox" id="sound-start" checked>
                                <span>Start</span>
                            </label>
                            <label class="sound-toggle">
                                <input type="checkbox" id="sound-end" checked>
                                <span>End</span>
                            </label>
                            <label class="sound-toggle">
                                <input type="checkbox" id="sound-tick">
                                <span>Tick</span>
                            </label>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <!-- ===== Progress & XP ===== -->
        <section class="gamification-section" aria-label="Progress and XP">
            <h2 class="section-title">Progress</h2>
            <div class="gamification-card">
                <div id="gamification-progress" aria-live="polite"></div>
            </div>
        </section>

        <!-- ===== Achievements ===== -->
        <section class="gamification-section" aria-label="Achievements">
            <h2 class="section-title">Achievements</h2>
            <div class="badges-grid" id="gamification-achievements" aria-live="polite"></div>
        </section>

        <!-- ===== Statistics ===== -->
        <section class="gamification-section" aria-label="Session statistics">
            <h2 class="section-title">Statistics</h2>
            <div class="gamification-card">
                <div class="stats-tabs" role="group" aria-label="Statistics view">
                    <button class="stats-tab active" data-view="weekly">Weekly</button>
                    <button class="stats-tab" data-view="monthly">Monthly</button>
                </div>
                <div id="gamification-chart" aria-live="polite"></div>
            </div>
        </section>
    </div>

    <!-- Toast notifications -->
    <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

    <script src="/js/api.js"></script>
    <script src="/js/gamification.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="/js/pomodoro.js"></script>
</body>
</html>
