<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System — Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Employee Management</h1>

            <div id="alert" class="alert hidden"></div>

            <!-- Login -->
            <div id="login-section">
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary">Log In</button>
                </form>
                <p class="toggle-link">
                    Don't have an account? <a href="#" id="show-register">Register</a>
                </p>
            </div>

            <!-- Register -->
            <div id="register-section" class="hidden">
                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
                <p class="toggle-link">
                    Already have an account? <a href="#" id="show-login">Log In</a>
                </p>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
