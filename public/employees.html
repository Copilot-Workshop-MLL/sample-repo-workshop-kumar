<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees — Employee Management</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header class="navbar">
        <span class="brand">Employee Management</span>
        <nav>
            <a href="/dashboard.html">Dashboard</a>
            <a href="/employees.html">Employees</a>
            <button id="logout-btn" class="btn-logout">Logout</button>
        </nav>
    </header>

    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
            <div>
                <h2>Employees</h2>
                <p id="user-label" class="page-meta"></p>
            </div>
            <button id="add-btn" class="btn btn-success">+ Add Employee</button>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="form-group">
                <label for="filter-dept">Department</label>
                <select id="filter-dept"><option value="">All</option></select>
            </div>
            <div class="form-group">
                <label for="filter-role">Role</label>
                <select id="filter-role"><option value="">All</option></select>
            </div>
            <button id="clear-filters" class="btn btn-sm" style="align-self:flex-end;background:#6c757d;color:#fff;">Clear</button>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Role</th>
                        <th>Hire Date</th>
                        <th>Salary</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employee-tbody">
                    <tr><td colspan="8" style="text-align:center;color:#6c757d;">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2 id="modal-title">Add Employee</h2>
            <div id="form-alert" class="alert hidden"></div>
            <form id="employee-form">
                <input type="hidden" id="emp-id">
                <div class="form-group">
                    <label for="emp-name">Name</label>
                    <input type="text" id="emp-name" required>
                </div>
                <div class="form-group">
                    <label for="emp-email">Email</label>
                    <input type="email" id="emp-email" required>
                </div>
                <div class="form-group">
                    <label for="emp-department">Department</label>
                    <input type="text" id="emp-department" required>
                </div>
                <div class="form-group">
                    <label for="emp-role">Role</label>
                    <input type="text" id="emp-role" required>
                </div>
                <div class="form-group">
                    <label for="emp-hireDate">Hire Date</label>
                    <input type="date" id="emp-hireDate" required>
                </div>
                <div class="form-group">
                    <label for="emp-salary">Salary</label>
                    <input type="number" id="emp-salary" min="1" step="0.01" required>
                </div>
                <div class="modal-actions">
                    <button type="button" id="modal-cancel" class="btn" style="background:#6c757d;color:#fff;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="width:auto;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/employees.js"></script>
</body>
</html>
